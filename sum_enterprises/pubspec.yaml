name: sum_enterprises
description: "SUM Enterprises - High-Performance Employee Management Field Service Platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation & Routing
  # GoRouter is the standard declarative routing package recommended by the Flutter team.
  # It manages deep linking, redirection based on auth state, and nested shell routes smoothly.
  go_router: ^13.2.0

  # State Management & Dependency Injection
  # Riverpod provides compile-safe dependency injection and state management.
  # Unlike Provider, it does not depend on the BuildContext, making it easy to access state
  # from the repository or service layers without widgets.
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Firebase Core & Authentication
  # Required to initialize Firebase and manage employee login sessions.
  # Session persistence and token refreshment are handled natively.
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8

  # Database (Cloud Firestore)
  # NoSQL real-time document store. Used to store employee records, job details, and roles.
  # Offline persistence is enabled by default on mobile platforms.
  cloud_firestore: ^4.15.8

  # Storage (Firebase Storage)
  # Blob store for files, images, signatures, and attachments captured during field services.
  firebase_storage: ^11.6.9

  # Push Notifications (Firebase Cloud Messaging)
  # Crucial for sending real-time job assignments, emergency notifications, and schedule updates to field workers.
  firebase_messaging: ^14.7.19

  # Google Maps SDK
  # Implements maps, routing, location pinning, and live location-tracking for the field workers.
  google_maps_flutter: ^2.5.3

  # GPS Location & Connection check for Attendance Management
  geolocator: ^11.0.0
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.5
  battery_plus: ^6.0.1
  device_info_plus: ^10.1.0

  # Utility & Date/Time
  # Essential for handling local timestamps, formatted reports, and date math.
  intl: ^0.19.0
  
  # For safe network tracking, logging, and remote HTTP requests.
  dio: ^5.4.0

  # Cupertino Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting & Static Analysis
  # Enforces clean coding style, type safety, and prevents performance anti-patterns.
  flutter_lints: ^3.0.1

  # Code Generation
  # Used alongside Riverpod to auto-generate Providers, keeping boilerplate minimal and safe.
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

  # Asset structure declared as requested
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # Design system custom fonts
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
